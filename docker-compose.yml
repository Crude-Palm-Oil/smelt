services:
  frontend:
    image: ghcr.io/Crude-Palm-Oil/smelt-frontend:latest
    container_name: smelt-frontend
    expose:
      - "3000"
  analysis:
    image: ghcr.io/Crude-Palm-Oil/smelt-analysis:latest
    container_name: smelt-analysis
    expose:
      - "8080"
    depends_on:
      - analysis-queue
  analysis-worker:
    image: ghcr.io/Crude-Palm-Oil/smelt-analysis-worker:latest
    container_name: smelt-analysis-worker
    depends_on:
      - analysis-queue
  backend:
    image: ghcr.io/Crude-Palm-Oil/smelt-backend:latest 
    container_name: smelt-backend
    expose:
      - "8000"
  reports:
    build: ghcr.io/Crude-Palm-Oil/smelt-reports:latest
    container_name: smelt-reports
    expose:
      - "8000"
  analysis-queue:
    image: redis:8-alpine
    container_name: smelt-analysis-queue
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: always
  caddy:
    image: caddy:latest
    container_name: smelt-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - analysis
      - analysis-worker
      - backend
      - reports
volumes:
  caddy_data:
  caddy_config:
  redis_data:
