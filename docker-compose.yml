services:
  smelt-analysis-api:
    container_name: smelt-analysis-api
    build:
      context: ../smelt-analysis
      dockerfile: api.Dockerfile
    ports:
      - 8080:8080
    environment:
      - ANALYSIS_REDIS_URL=${ANALYSIS_REDIS_URL}
      - S3_BUCKET_ACCESS_KEY=${S3_BUCKET_ACCESS_KEY}
      - S3_BUCKET_SECRET_KEY=${S3_BUCKET_SECRET_KEY}
      - S3_BUCKET_REGION=${S3_BUCKET_REGION}
      - S3_BUCKET_ENDPOINT=${S3_BUCKET_ENDPOINT}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE}
    depends_on:
      - smelt-db
      - smelt-s3
      - smelt-analysis-redis
  smelt-analysis-worker:
    container_name: smelt-analysis-worker
    build:
      context: ../smelt-analysis
      dockerfile: worker.Dockerfile
    environment:
      - ANALYSIS_WORKER_CONCURRENCY=${ANALYSIS_WORKER_CONCURRENCY}
      - ANALYSIS_REDIS_URL=${ANALYSIS_REDIS_URL}
      - S3_BUCKET_ACCESS_KEY=${S3_BUCKET_ACCESS_KEY}
      - S3_BUCKET_SECRET_KEY=${S3_BUCKET_SECRET_KEY}
      - S3_BUCKET_REGION=${S3_BUCKET_REGION}
      - S3_BUCKET_ENDPOINT=${S3_BUCKET_ENDPOINT}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE}
    depends_on:
      - smelt-db
      - smelt-s3
      - smelt-analysis-redis
  smelt-analysis-redis:
    container_name: smelt-analysis-redis
    image: redis:latest
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    expose:
      - 6379
  smelt-s3:
    container_name: smelt-s3
    image: rustfs/rustfs:latest
    expose:
      - 9000
      - 9001
    volumes:
      - s3-data:/data
    environment:
      - RUSTFS_ACCESS_KEY=${S3_BUCKET_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${S3_BUCKET_SECRET_KEY}
    command: 
      - "--access-key"
      - ${S3_BUCKET_ACCESS_KEY}
      - "--secret-key"
      - ${S3_BUCKET_SECRET_KEY}
      - "/data"
    restart: unless-stopped
  smelt-db:
    container_name: smelt-db
    image: postgres:latest
    expose:
      - 5432
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
volumes:
  s3-data:
  redis-data:
  db-data:
